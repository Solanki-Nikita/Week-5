<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do App</title>
  <link rel="stylesheet" href="to-do.css" />
  
</head>
<body>
  <div class="app">
    <h1>To-Do App</h1>

    <form id="todoForm" class="form">
      <input id="taskInput" type="text" placeholder="Enter task..." />
      <input id="dueInput" type="date" />
      <button type="submit">Add</button>
    </form>

    <p id="statusMsg" class="msg"></p>

    <div class="sections">
      <section>
        <h2>Pending</h2>
        <ul id="pendingList" class="list"></ul>
      </section>

      <section>
        <h2>Completed</h2>
        <ul id="completedList" class="list"></ul>
      </section>

    </div>
  </div>

  <script src="to-do.js" defer></script>
</body>
</html>
