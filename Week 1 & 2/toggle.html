<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Theme Toggle</title>
  <link rel="stylesheet" href="toggle.css" />
 
</head>
<body>
  <div class="app">
    <h1>Theme Toggle</h1>

    <div class="toggle-row">
      <span id="themeIcon" class="icon" aria-hidden="true">🌞</span>

      <label class="switch">
        
        <input id="themeToggle" type="checkbox" />
        <span class="slider"></span>
      </label>

      <span id="themeStatus" class="status">Light Mode</span>
    </div>

    <p class="hint">
      Theme preference is saved in <code>localStorage</code>.
    </p>
  </div>

   <script src="toggle.js" defer></script>
</body>
</html>
